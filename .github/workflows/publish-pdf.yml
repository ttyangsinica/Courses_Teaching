name: Build and Publish PDFs (GitHub Pages)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile L1_Intro PDFs (XeLaTeX + CJK)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: L1_Intro
          root_file: |
            L1_Intro_data_2026_v1.tex
            L1_Intro_labor_2026_v1.tex
            L1_Intro_metrics_2026_v1.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -halt-on-error
          extra_system_packages: |
            fontconfig
            font-noto-cjk
          continue_on_error: true

      - name: Show LaTeX log tails (always)
        if: always()
        run: |
          set +e
          echo "=== Find log files ==="
          find . -maxdepth 4 -type f \( -name "*.log" -o -name "*.fls" -o -name "*.fdb_latexmk" \) -print
          echo "=== Tail .log files ==="
          for f in $(find . -maxdepth 4 -type f -name "*.log"); do
            echo "----- $f (tail) -----"
            tail -n 80 "$f" || true
          done
          exit 0

      - name: Upload LaTeX logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex_logs
          path: |
            **/*.log
            **/*.fls
            **/*.fdb_latexmk

      - name: Prepare site folder
        if: always()
        run: |
          mkdir -p public
          cp -r L1_Intro public/ || true
          echo "=== PDFs in public/L1_Intro ==="
          ls -ლა public/L1_Intro/*.pdf 2>/dev/null || true

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4