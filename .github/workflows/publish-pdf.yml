name: Build and Publish PDFs

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ① 安裝 Noto CJK 字型
      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      # ② 編譯 L1_Intro
      - name: Compile PDFs
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: L1_Intro
          root_file: |
            L1_Intro_data_2026_v1.tex
            L1_Intro_labor_2026_v1.tex
            L1_Intro_metrics_2026_v1.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -halt-on-error

      # ③ 建立發佈資料夾
      - name: Prepare site
        run: |
          mkdir public
          cp -r L1_Intro public/

      # ④ 上傳到 Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4