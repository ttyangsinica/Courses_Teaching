name: Build and Publish PDFs (GitHub Pages)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Compile PDFs inside TeXLive Docker image (Alpine-based)
      # Install CJK fonts inside the container so XeLaTeX can find "Noto Sans CJK TC"
      - name: Compile L1_Intro PDFs (XeLaTeX + CJK)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: L1_Intro
          root_file: |
            L1_Intro_data_2026_v1.tex
            L1_Intro_labor_2026_v1.tex
            L1_Intro_metrics_2026_v1.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -halt-on-error
          extra_system_packages: |
            fontconfig
            noto-fonts-cjk

      # Prepare the GitHub Pages site contents
      # We publish the whole L1_Intro folder so the PDF URLs are stable:
      # https://<user>.github.io/<repo>/L1_Intro/<pdfname>.pdf
      - name: Prepare site folder
        run: |
          mkdir -p public
          cp -r L1_Intro public/

      # Upload to GitHub Pages as an artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # Optional but helpful: upload logs even if compilation fails
      - name: Upload LaTeX logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex_logs
          path: |
            L1_Intro/*.log
            L1_Intro/*.fls
            L1_Intro/*.fdb_latexmk

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4