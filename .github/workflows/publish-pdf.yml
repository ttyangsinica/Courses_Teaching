        with:
          working_directory: L1_Intro
          root_file: |
            L1_Intro_data.tex
            L1_Intro_labor.tex
            L1_Intro_metrics.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -halt-on-error
          extra_system_packages: |
            fontconfig
            font-noto-cjk
          continue_on_error: true

      - name: Upload PDFs (L1_Intro)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf_L1_Intro
          path: |
            L1_Intro/*.pdf

