name: Build Chinese Beamer PDFs
on: [push]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Install Noto Sans CJK TC Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          # 使用 xelatex 編譯以支援 xeCJK
          compiler: xelatex
          root_file: |
            L1_Intro_data_2026_v1.tex
            L1_Intro_labor_2026_v1.tex
            L1_Intro_metrics_2026_v1.tex
          working_directory: L1_Intro/
          # 這裡確保字體快取有更新
          args: "-interaction=nonstopmode -halt-on-error -file-line-error"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./L1_Intro
          keep_files: true
          # 這裡會將編譯好的 pdf 移動到網站目錄
          destination_dir: slides
