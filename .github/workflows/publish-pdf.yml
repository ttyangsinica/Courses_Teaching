name: Build and Publish PDFs (GitHub Pages)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Compile PDFs inside TeXLive Docker image (Alpine-based).
      # Install CJK fonts inside the container so XeLaTeX can find "Noto Sans CJK TC".
      - name: Compile L1_Intro PDFs (XeLaTeX + CJK)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: L1_Intro
          root_file: |
            L1_Intro_data_2026_v1.tex
            L1_Intro_labor_2026_v1.tex
            L1_Intro_metrics_2026_v1.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error -halt-on-error
          extra_system_packages: |
            fontconfig
            noto-fonts-cjk
          # If something fails, still let the action proceed so we can upload logs.
          continue_on_error: true

      # Print last lines of logs to make the real error visible in Actions UI
      - name: Show LaTeX log tails (always)
        if: always()
        run: |
          set +e
          echo "=== List possible log files ==="
          find . -maxdepth 3 -type f \( -name "*.log" -o -name "*.fls" -o -name "*.fdb_latexmk" \) -print
          echo "=== Tail .log files (if any) ==="
          for f in $(find . -maxdepth 3 -type f -name "*.log"); do
            echo "----- $f (tail) -----"
            tail -n 80 "$f" || true
          done
          exit 0

      # Upload logs even if compilation fails; search both root and subfolders.
      - name: Upload LaTeX logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latex_logs
          path: |
            **/*.log
            **/*.fls
            **/*.fdb_latexmk

      # Only proceed to Pages artifact if PDFs exist
      - name: Prepare site folder (only if PDFs exist)
        if: always()
        run: |
          mkdir -p public
          # Copy the folder regardless, but PDFs may be missing if compilation failed
          cp -r L1_Intro public/ || true
          ls -la public/L1_Intro || true

      - name: Upload Pages artifact (only if PDFs exist)
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4