name: Build and Publish PDFs (GitHub Pages)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    name: Build PDFs & Deploy to Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Build PDFs
      # -----------------------------
      - name: Compile L1_Intro PDFs (XeLaTeX + CJK)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: L1_Intro
          root_file: |
            L1_Intro_data_2026_v1.tex
            L1_Intro_labor_2026_v1.tex
            L1_Intro_metrics_2026_v1.tex
          latexmk_use_xelatex: true
          # no bibtex
          args: -interaction=nonstopmode -file-line-error -halt-on-error -bibtex-
          extra_system_packages: |
            fontconfig
            font-noto-cjk
          continue_on_error: false

      - name: Compile L2_PO PDFs (XeLaTeX + CJK)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: L2_PO
          root_file: |
            L2_Potential_Outcome_labor_2026_v1.tex
            L2_Potential_Outcome_metrics_2026_v1.tex
          latexmk_use_xelatex: true
          # no bibtex
          args: -interaction=nonstopmode -file-line-error -halt-on-error -bibtex-
          extra_system_packages: |
            fontconfig
            font-noto-cjk
          continue_on_error: false

      - name: Compile L3_SB_RCT PDFs (XeLaTeX + CJK)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: L3_SB_RCT
          root_file: |
            L3_selection_bias_RCT_labor_2026_v1.tex
            L3_selection_bias_RCT_metrics_2026_v1.tex
          latexmk_use_xelatex: true
          # no bibtex
          args: -interaction=nonstopmode -file-line-error -halt-on-error -bibtex-
          extra_system_packages: |
            fontconfig
            font-noto-cjk
          continue_on_error: false

      # -----------------------------
      # Debug logs (only if build fails)
      # -----------------------------
      - name: Upload LaTeX logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex_logs
          path: |
            **/*.log
            **/*.fls
            **/*.fdb_latexmk

      # -----------------------------
      # Prepare public/ for Pages
      # -----------------------------
      - name: Prepare site folder
        run: |
          set -e
          mkdir -p public

          # copy PDFs into public/<folder>/
          mkdir -p public/L1_Intro public/L2_PO public/L3_SB_RCT
          cp -v L1_Intro/*.pdf public/L1_Intro/ || true
          cp -v L2_PO/*.pdf public/L2_PO/ || true
          cp -v L3_SB_RCT/*.pdf public/L3_SB_RCT/ || true

          echo "=== PDFs in public ==="
          find public -maxdepth 3 -type f -name "*.pdf" -print || true

      - name: Generate index.html
        shell: bash
        run: |
          set -e
          {
            echo "<!doctype html>"
            echo "<html><head><meta charset='utf-8'>"
            echo "<meta name='viewport' content='width=device-width, initial-scale=1'>"
            echo "<title>Course PDFs</title>"
            echo "<style>"
            echo "body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;max-width:960px;margin:24px auto;padding:0 12px;}"
            echo "h1{font-size:22px;margin:0 0 12px 0;}"
            echo "h2{font-size:18px;margin:20px 0 8px 0;border-bottom:1px solid #ddd;padding-bottom:6px;}"
            echo "ul{margin:6px 0 0 18px;}"
            echo "li{margin:6px 0;}"
            echo "a{text-decoration:none;} a:hover{text-decoration:underline;}"
            echo ".muted{color:#666;font-size:13px;margin-top:6px;}"
            echo "</style>"
            echo "</head><body>"
            echo "<h1>Course PDFs</h1>"
            echo "<div class='muted'>Updated automatically from the repository.</div>"
          } > public/index.html

          for dir in $(find public -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | sort); do
            pdfs=$(find "public/${dir}" -maxdepth 1 -type f -name "*.pdf" -printf "%f\n" | sort || true)
            if [ -n "$pdfs" ]; then
              echo "<h2>${dir}</h2><ul>" >> public/index.html
              while IFS= read -r f; do
                [ -n "$f" ] || continue
                echo "<li><a href='./${dir}/${f}'>${f}</a></li>" >> public/index.html
              done <<< "$pdfs"
              echo "</ul>" >> public/index.html
            fi
          done

          echo "</body></html>" >> public/index.html
          echo "=== index.html generated ==="
          head -n 40 public/index.html

      # -----------------------------
      # Deploy to GitHub Pages (official flow)
      # -----------------------------
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4